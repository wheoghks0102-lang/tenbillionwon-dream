<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코딩하는 시나모롤 - 온라인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- Gun.js for Real-time shared state -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body>
    <div id="login-overlay">
        <div id="login-box">
            <h2>시나모롤 마을 입성</h2>
            <p>활동할 닉네임을 입력해주세요!</p>
            <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대 8자)" maxlength="8">
            <button id="login-button">입장하기 ✨</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header>
            <h1>코딩 시나모롤과 오합지졸 대작전</h1>
            <div id="user-info">
                <div class="info-line">내 닉네임: <span id="my-nickname"></span></div>
                <div class="info-line online-list-wrapper">지금 접속 중: <span id="online-users-list">...</span></div>
            </div>
        </header>
        <main id="main-content">
            <section id="history-section">
                <h3>활동 로그 📜</h3>
                <div id="attempt-history">
                    <p class="history-item empty">아직 소식이 없어요...</p>
                </div>
            </section>
            <section id="cinnamon-section">
                <div class="cinnamon-card">
                    <img src="coding-cinnamonroll.jpg" alt="코딩하는 시나모롤" id="cinnamon-img">
                    <div id="code-output" class="code-box">
                        <p>시나모롤이 온라인에서 코딩할 준비를 하고 있어요...</p>
                    </div>
                    <div id="coding-status">오늘 남은 기회: <span id="chance-count">3</span>/3</div>
                    <button id="code-button">시나모롤에게 코딩 시키기! ✨</button>
                </div>
            </section>
            <section id="characters-section">
                <div id="character-grid">
                    <!-- JavaScript로 캐릭터 카드 생성 -->
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
